name: Release Extension

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    name: release/build-and-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

      - name: Validate tag matches manifest version
        run: |
          MANIFEST_VERSION=$(node -p "require('./public/manifest.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version v$TAG_VERSION does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Create release archive
        run: |
          ARCHIVE="ApplyNest-extension-${GITHUB_REF_NAME}.zip"
          cd dist
          zip -r "../$ARCHIVE" .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ApplyNest-extension-${{ github.ref_name }}.zip
